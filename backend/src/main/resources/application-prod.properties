# ============================================
# PRODUCTION Configuration - Hostinger Cloud
# ============================================

# Server Configuration
server.port=8080
server.servlet.context-path=/api
spring.application.name=agrocare-backend

# Database - PostgreSQL (PRODUCTION)
# Update these with your Hostinger PostgreSQL credentials
spring.datasource.url=jdbc:postgresql://localhost:5432/agrocare_db
spring.datasource.username=agrocare_user
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# MongoDB (PRODUCTION)
spring.data.mongodb.uri=mongodb://localhost:27017/agrocare_nosql
spring.data.mongodb.database=agrocare_nosql

# JWT Configuration - CHANGE THIS TO A STRONG SECRET!
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Application Configuration
app.name=Agrocare
app.version=1.0.0

# Logging - Production level
logging.level.root=WARN
logging.level.com.agrocare=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.file.name=/var/log/agrocare/application.log

# CORS Configuration
cors.allowed-origins=https://agocare.com,https://www.agocare.com
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=/var/www/agocare/uploads/
