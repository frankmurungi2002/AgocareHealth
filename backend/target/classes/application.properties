# Server Configuration
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api
spring.application.name=agrocare-backend

# Database - PostgreSQL (SQL)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:agrocare_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Uttorent@24}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=false

# Flyway Migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=0

# MongoDB (NoSQL)
spring.data.mongodb.uri=mongodb://${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DB:agrocare_nosql}
spring.data.mongodb.database=${MONGO_DB:agrocare_nosql}

# JWT Configuration
jwt.secret=${JWT_SECRET:your_super_secret_key_change_this_in_production_environment_12345}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Application Configuration
app.name=Agocare
app.version=1.0.0
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Pagination Defaults
app.pagination.default-page-size=10
app.pagination.max-page-size=50

# Logging
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.agrocare=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=${LOG_LEVEL:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL:INFO}
logging.level.org.flywaydb=${LOG_LEVEL:INFO}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=${UPLOAD_DIR:/uploads/}

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# OAuth2 Configuration
# Google OAuth (get credentials at https://console.developers.google.com)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:763802061227-ul45ph8qbvmcllvvtgdhqm9dlb6nk95s.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/oauth/google/callback}

# Facebook OAuth (get credentials at https://developers.facebook.com)
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_APP_ID:}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_APP_SECRET:}
spring.security.oauth2.client.registration.facebook.redirect-uri=${FACEBOOK_REDIRECT_URI:http://localhost:8080/api/auth/oauth/facebook/callback}

# Apple OAuth (get credentials at https://developer.apple.com)
spring.security.oauth2.client.registration.apple.client-id=${APPLE_CLIENT_ID:}
spring.security.oauth2.client.registration.apple.client-secret=${APPLE_CLIENT_SECRET:}

# Frontend URL for OAuth redirects
app.frontend-url=${FRONTEND_URL:http://localhost:8000}
