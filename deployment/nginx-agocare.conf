# ============================================
# Nginx Configuration for Agocare Health
# Copy this to: /etc/nginx/sites-available/agocare.com
# ============================================

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name agocare.com www.agocare.com;
    return 301 https://$server_name$request_uri;
}

# Main HTTPS server block
server {
    listen 443 ssl http2;
    server_name agocare.com www.agocare.com;

    # SSL certificates (managed by Certbot)
    # ssl_certificate /etc/letsencrypt/live/agocare.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/agocare.com/privkey.pem;

    # Frontend - serve static HTML/CSS/JS files
    root /var/www/agocare/frontend;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml;

    # Frontend pages
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Static assets caching
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API - Proxy to Spring Boot backend
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # CORS headers (handled by Spring Boot, but fallback)
        proxy_hide_header Access-Control-Allow-Origin;

        # File upload support
        client_max_body_size 10M;
    }

    # Uploads directory
    location /uploads/ {
        alias /var/www/agocare/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
    }
}
