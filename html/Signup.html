<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agocare - Sign Up</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/logo.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <script src="../js/utils/storage.js"></script>
    <script src="../js/utils/toast.js"></script>
    <script src="../js/utils/validators.js"></script>
    <script src="../js/utils/ui.js"></script>
    <script src="../js/navigation.js"></script>
    <script src="../js/api-client.js"></script>
    <script src="../js/oauth-config.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js" async defer></script>
    <script src="../js/login.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Header -->
            <div class="auth-header">
                <div class="logo-container">
                    <img src="../images/logo.svg" alt="Agocare Logo" class="logo-icon">
                    <span class="logo-text">Agocare</span>
                </div>
                <p id="header-subtitle">Join our community of doctors and patients.</p>
            </div>

            <!-- Signup Form -->
            <form id="signup-form" class="auth-form active">
                <div class="form-group">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="signup-username">Username</label>
                    <input type="text" id="signup-username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label for="signup-email">Email address</label>
                    <input type="email" id="signup-email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label for="signup-confirm-password">Confirm Password</label>
                    <input type="password" id="signup-confirm-password" placeholder="Confirm your password" required>
                </div>

                <!-- Role Selection -->
                <div class="form-group">
                    <label>I am joining as a:</label>
                    <div class="role-selector" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                        <div class="role-option active" onclick="selectRole('PATIENT', this)">
                            <span class="role-icon">👤</span>
                            <span class="role-label">Patient</span>
                        </div>
                        <div class="role-option" onclick="selectRole('DOCTOR', this)">
                            <span class="role-icon">🩺</span>
                            <span class="role-label">Doctor</span>
                        </div>
                        <div class="role-option" onclick="selectRole('NURSE', this)">
                            <span class="role-icon">💉</span>
                            <span class="role-label">Nurse</span>
                        </div>
                        <div class="role-option" onclick="selectRole('PROFESSOR', this)">
                            <span class="role-icon">🎓</span>
                            <span class="role-label">Professor</span>
                        </div>
                    </div>
                    <input type="hidden" id="signup-role" value="PATIENT">
                </div>

                <!-- Medical Professional Fields (shown for Doctor, Nurse, Professor) -->
                <div id="health-worker-fields" class="hidden">
                    <div class="form-group">
                        <label for="hw-facility">Health Facility / Institution</label>
                        <input type="text" id="hw-facility" placeholder="e.g. Mulago Hospital">
                    </div>
                </div>

                <button type="submit" class="submit-btn">Create Account</button>
            </form>

            <!-- Social Authentication -->
            <div class="social-auth">
                <div class="divider">
                    <span>OR</span>
                </div>
                
                <button type="button" class="social-btn google-btn" onclick="handleGoogleLogin()">
                    <svg class="social-icon" viewBox="0 0 24 24" width="20" height="20">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>
                
                <button type="button" class="social-btn facebook-btn" onclick="handleFacebookLogin()">
                    <svg class="social-icon" viewBox="0 0 24 24" width="20" height="20">
                        <path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    Continue with Facebook
                </button>
                
                <button type="button" class="social-btn apple-btn" onclick="handleAppleLogin()">
                    <svg class="social-icon" viewBox="0 0 24 24" width="20" height="20">
                        <path fill="#000000" d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
                    </svg>
                    Continue with Apple
                </button>
            </div>

            <!-- Footer -->
            <div class="auth-footer">
                <p>Already have an account? <a href="Login.html">Login here</a></p>
                <button type="button" class="guest-link" onclick="window.location.href='index.html'">Continue as guest</button>
            </div>
        </div>
    </div>
</body>
</html>
