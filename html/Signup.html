<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agocare - Sign Up</title>
    <link rel="stylesheet" href="../css/login.css">
    <!-- <script src="../js/navigation.js"></script> -->
    <!-- <script src="../js/api-client.js"></script> -->
    <!-- <script src="../js/login.js"></script> -->
</head>
<body>
    <div class="auth-container">
        <div class="auth-card"> 
            <!-- Header -->
            <div class="auth-header">
                <h1 class="logo"><span class="text-red">Ago</span><span class="text-blue">care</span></h1>
                <p id="header-subtitle">Join our community of doctors and patients.</p>
            </div>

            <!-- Signup Form -->
            <form id="signup-form" class="auth-form active" action="../php/signup.php" method="POST">
                <div class="form-group">
                    <label for="signup-name">Full Name</label>
                    <input name="Fullname" type="text" id="signup-name" placeholder="Name" required>
                </div>
                <div class="form-group">
                    <label for="signup-username">Username</label>
                    <input name="username" type="text" id="signup-username" placeholder="Username" required>
                </div>
                <div class="form-group">
                    <label for="signup-email">Email address</label>
                    <input name="email" type="email" id="signup-email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input name="password" type="password" id="signup-password" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label for="signup-confirm-password">Confirm Password</label>
                    <input name="confirm-password" type="password" id="signup-confirm-password" placeholder="Confirm your password" required>
                </div>

                <!-- Role Selection -->
                <div class="form-group">
                    <label>I am joining as a:</label>
                    <div class="role-selector">
                        <div class="role-option active" onclick="selectRole('Community', this)">
                            <span class="role-icon"></span>
                            <span class="role-label">Community</span>
                        </div>
                        <div class="role-option" onclick="selectRole('Health Worker', this)">
                            <span class="role-icon"></span>
                            <span class="role-label">Health Worker</span>
                        </div>
                    </div>
                    <input name="role" type="hidden" id="signup-role" value="community">
                </div>

                <!-- Health Worker Specifics (Hidden by default) -->
                <div id="health-worker-fields" class="hidden">
                    <div class="form-group">
                        <label for="hw-title">Title</label>
                        <select name="title" id="hw-title">
                            <option value="Dr.">Dr.</option>
                            <option value="Nurse">Nurse</option>
                            <option value="Prof.">Prof.</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="hw-facility">Health Facility Name</label>
                        <input name="facilityName" type="text" id="hw-facility" placeholder="e.g. Mulago Hospital">
                    </div>
                </div>

                <button type="submit" class="submit-btn">Create Account</button>
            </form>

            <!-- Footer -->
            <div class="auth-footer">
                <span class ="h">Already have an account? <a href="Login.html">Login here</a></span>
                <a href="patientDashboard.html">Continue as guest</a>
            </div>
        </div>
    </div>
    <script src="../js/login.js"></script>
</body>
</html>
